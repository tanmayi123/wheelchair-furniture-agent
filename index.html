<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WheelFit — Accessible Furniture Advisor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      color: white;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.5rem; font-weight: 600; }
    header span { font-size: 1.8rem; }
    header p { font-size: 0.85rem; color: #aaa; margin-top: 2px; }

    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .card h2 { font-size: 1.1rem; margin-bottom: 20px; color: #333; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    label { display: block; font-size: 0.8rem; color: #666; margin-bottom: 6px; }

    input, select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fafafa;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #1a1a1a;
      background: white;
    }

    .furniture-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .furniture-btn {
      padding: 8px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    .furniture-btn.selected {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .submit-btn:hover { background: #333; }
    .submit-btn:disabled { background: #999; cursor: not-allowed; }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
      display: none;
    }

    .loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .results { display: none; }

    .combo-card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border-left: 4px solid #1a1a1a;
    }

    .combo-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .combo-name { font-size: 1.2rem; font-weight: 600; }
    .combo-price { font-size: 1.1rem; color: #444; font-weight: 500; }

    .combo-desc { color: #555; font-size: 0.9rem; margin-bottom: 16px; line-height: 1.5; }

    .why-it-works {
      background: #f0f7f0;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #2d6a2d;
      margin-bottom: 16px;
    }

    .why-it-works::before { content: "♿ "; }

    .items-list { display: flex; flex-direction: column; gap: 8px; }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #fafafa;
      border-radius: 8px;
      font-size: 0.88rem;
    }

    .item-category { color: #888; font-size: 0.78rem; text-transform: uppercase; }
    .item-name { font-weight: 500; margin-top: 2px; }

    .score-badge {
      padding: 4px 10px;
      background: #1a1a1a;
      color: white;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .score-badge.high { background: #2d6a2d; }
    .score-badge.mid  { background: #7a5c00; }
    .score-badge.low  { background: #8b0000; }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #333;
    }

    .top-items-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .category-block {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .category-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .product-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.85rem;
    }

    .product-item:last-child { border-bottom: none; }
    .product-item-name { color: #333; }
  </style>
</head>
<body>

<header>
  <span>♿</span>
  <div>
    <h1>WheelFit</h1>
    <p>Accessible furniture recommendations powered by AI</p>
  </div>
</header>

<div class="container">

  <!-- INPUT FORM -->
  <div class="card" id="form-card">
    <h2>Tell us about your room</h2>

    <div class="form-row">
      <div>
        <label>Room Width (ft)</label>
        <input type="number" id="room-width" value="12" min="8" max="30" />
      </div>
      <div>
        <label>Room Length (ft)</label>
        <input type="number" id="room-length" value="14" min="8" max="30" />
      </div>
    </div>

    <div class="form-row">
      <div>
        <label>Wheelchair Type</label>
        <select id="wheelchair-type">
          <option value="standard">Standard Manual</option>
          <option value="power">Power Wheelchair</option>
          <option value="transport">Transport Chair</option>
        </select>
      </div>
      <div>
        <label>Style Preference</label>
        <select id="style">
          <option value="scandinavian minimalist">Scandinavian Minimalist</option>
          <option value="modern">Modern</option>
          <option value="european classic">European Classic</option>
          <option value="industrial">Industrial</option>
          <option value="bohemian">Bohemian</option>
        </select>
      </div>
    </div>

    <div style="margin-bottom: 20px;">
      <label>Furniture Needed (select all that apply)</label>
      <div class="furniture-grid">
        <button class="furniture-btn selected" data-value="beds">🛏 Bed</button>
        <button class="furniture-btn" data-value="sofas">🛋 Sofa</button>
        <button class="furniture-btn" data-value="dressers">🗄 Dresser</button>
        <button class="furniture-btn selected" data-value="floor lamps">💡 Floor Lamp</button>
        <button class="furniture-btn" data-value="desks">🖥 Desk</button>
        <button class="furniture-btn" data-value="dining chairs">🪑 Dining Chair</button>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="runAgent()">
      Find Accessible Furniture →
    </button>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loading-text">Agent is searching Wayfair...</p>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results"></div>

</div>

<script>
  // Toggle furniture buttons
  document.querySelectorAll('.furniture-btn').forEach(btn => {
    btn.addEventListener('click', () => btn.classList.toggle('selected'));
  });

  function getSelectedFurniture() {
    return [...document.querySelectorAll('.furniture-btn.selected')]
      .map(b => b.dataset.value);
  }

  function scoreBadgeClass(score) {
    if (score >= 80) return 'high';
    if (score >= 60) return 'mid';
    return 'low';
  }

  const loadingMessages = [
    "Agent is searching Wayfair...",
    "Checking wheelchair clearance for each item...",
    "Scoring accessibility features...",
    "Matching items into room combinations..."
  ];

  async function runAgent() {
    const furniture = getSelectedFurniture();
    if (!furniture.length) { alert('Please select at least one furniture type.'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    document.getElementById('form-card').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').style.display = 'none';

    // Cycle loading messages
    let msgIndex = 0;
    const msgInterval = setInterval(() => {
      msgIndex = (msgIndex + 1) % loadingMessages.length;
      document.getElementById('loading-text').textContent = loadingMessages[msgIndex];
    }, 2500);

    try {
      const response = await fetch('http://127.0.0.1:8000/agent/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          room_width_ft: parseFloat(document.getElementById('room-width').value),
          room_length_ft: parseFloat(document.getElementById('room-length').value),
          furniture_needed: furniture,
          wheelchair_type: document.getElementById('wheelchair-type').value,
          user_style: document.getElementById('style').value
        })
      });

      const data = await response.json();
      clearInterval(msgInterval);
      renderResults(data);

    } catch (err) {
      clearInterval(msgInterval);
      alert('Something went wrong. Make sure the agent server is running.');
      document.getElementById('form-card').style.display = 'block';
      btn.disabled = false;
    }

    document.getElementById('loading').style.display = 'none';
  }

  function renderResults(data) {
    const el = document.getElementById('results');
    el.style.display = 'block';

    // Top items per category
    let topItemsHtml = `<p class="section-title">Top Scored Items</p><div class="top-items-grid">`;
    for (const [category, items] of Object.entries(data.top_items_per_category)) {
      topItemsHtml += `<div class="category-block">
        <div class="category-title">${category}</div>`;
      items.forEach(item => {
        topItemsHtml += `<div class="product-item">
          <span class="product-item-name">${item.name}</span>
          <span class="score-badge ${scoreBadgeClass(item.score)}">${item.score}</span>
        </div>`;
      });
      topItemsHtml += `</div>`;
    }
    topItemsHtml += `</div>`;

    // Combo cards
    let combosHtml = `<p class="section-title">Recommended Room Setups</p>`;
    data.recommended_combos.forEach((combo, i) => {
      let itemsHtml = '';
      for (const [cat, name] of Object.entries(combo.items)) {
        const score = data.top_items_per_category[cat]?.find(x => x.name === name)?.score || '';
        itemsHtml += `<div class="item-row">
          <div>
            <div class="item-category">${cat}</div>
            <div class="item-name">${name}</div>
          </div>
          ${score ? `<span class="score-badge ${scoreBadgeClass(score)}">${score}/100</span>` : ''}
        </div>`;
      }

      combosHtml += `<div class="combo-card">
        <div class="combo-header">
          <div class="combo-name">${i === 0 ? '⭐ ' : ''}${combo.name}</div>
          <div class="combo-price">$${combo.total_price}</div>
        </div>
        <div class="combo-desc">${combo.style_description}</div>
        <div class="why-it-works">${combo.why_it_works}</div>
        <div class="items-list">${itemsHtml}</div>
      </div>`;
    });

    // Reset button
    const resetHtml = `<button class="submit-btn" onclick="resetForm()" 
      style="margin-top:8px;background:#555;">← Start Over</button>`;

    el.innerHTML = topItemsHtml + combosHtml + resetHtml;
  }

  function resetForm() {
    document.getElementById('results').style.display = 'none';
    document.getElementById('form-card').style.display = 'block';
    document.getElementById('submit-btn').disabled = false;
  }
</script>

</body>
</html>
